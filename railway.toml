[build]
builder = "DOCKERFILE"
dockerfilePath = "engineering/cad-server/Dockerfile"
watchPatterns = ["engineering/cad-server/**", "billing/supabase/**", "package.json", "package-lock.json"]

[deploy]
# Use Dockerfile CMD (npx tsx engineering/cad-server/standalone.ts)
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
