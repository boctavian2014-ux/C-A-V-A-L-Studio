name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        options: [stable, beta, nightly]
        default: stable
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: release/${{ inputs.channel }}
      - name: Generate changelog
        run: |
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~20)..HEAD > RELEASE_NOTES.md
      - name: Generate feed and publish
        env:
          CAVAL_RELEASE_CHANNEL: ${{ inputs.channel }}
          PUBLISH_RELEASE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CAVAL_RELEASE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CAVAL_RELEASE_AWS_SECRET_ACCESS_KEY }}
        run: npx tsx .cicd/scripts/publish-release.ts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Caval Studio ${{ inputs.version }} (${{ inputs.channel }})
          body_path: RELEASE_NOTES.md
          prerelease: ${{ inputs.channel != 'stable' }}
          files: release/${{ inputs.channel }}/**
      - name: Upload release metrics
        uses: actions/upload-artifact@v4
        with:
          name: release-metrics
          path: .cicd-metrics.json
