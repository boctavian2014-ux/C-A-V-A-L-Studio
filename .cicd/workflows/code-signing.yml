name: Code Signing

on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        options: [stable, beta, nightly]
        default: beta

jobs:
  sign:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: release
      - name: Sign artifacts
        env:
          CAVAL_BUILD_PLATFORM: ${{ matrix.platform }}
          CAVAL_RELEASE_CHANNEL: ${{ inputs.channel }}
          CAVAL_WIN_CERT_SHA1: ${{ secrets.CAVAL_WIN_CERT_SHA1 }}
          CAVAL_WIN_CERT_FILE: ${{ secrets.CAVAL_WIN_CERT_FILE }}
          CAVAL_WIN_CERT_PASSWORD: ${{ secrets.CAVAL_WIN_CERT_PASSWORD }}
          CAVAL_MAC_DEVELOPER_ID: ${{ secrets.CAVAL_MAC_DEVELOPER_ID }}
          CAVAL_APPLE_ID: ${{ secrets.CAVAL_APPLE_ID }}
          CAVAL_APPLE_TEAM_ID: ${{ secrets.CAVAL_APPLE_TEAM_ID }}
          CAVAL_APPLE_APP_PASSWORD: ${{ secrets.CAVAL_APPLE_APP_PASSWORD }}
        run: npx tsx .cicd/scripts/sign-artifacts.ts
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-${{ matrix.platform }}
          path: release/**
