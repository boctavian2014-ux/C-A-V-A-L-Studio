name: Publish Marketplace

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "extensions/**"
      - "marketplace/**"

jobs:
  publish-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build official extensions
        run: |
          if [ -d extensions ]; then npm run build; else echo "No official extensions directory yet."; fi
      - name: Validate, scan and publish extensions
        env:
          PUBLISH_MARKETPLACE: "true"
          CAVAL_MARKETPLACE_URL: ${{ secrets.CAVAL_MARKETPLACE_URL }}
          CAVAL_MARKETPLACE_TOKEN: ${{ secrets.CAVAL_MARKETPLACE_TOKEN }}
        run: npx tsx .cicd/scripts/publish-marketplace.ts
