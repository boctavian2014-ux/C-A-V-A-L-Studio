    <path d="M74 44V84" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" opacity="0.78"/>
    <path d="M36 52C44 43 72 43 80 52" fill="none" stroke="#D4A857" stroke-width="3" stroke-linecap="round" opacity="0.88"/>
